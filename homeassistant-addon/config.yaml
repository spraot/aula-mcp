name: aula-mcp
version: "1.0.1"
slug: aula_mcp
description: >-
  MCP server for the Danish school platform Aula. Exposes aula.discover,
  ugeplan, lektier, messages and more as MCP tools that HA's Assist
  conversation agent (Anthropic / OpenAI / Ollama / etc.) can call —
  including via Voice. Point HA's official `mcp` (client) integration
  at http://homeassistant.local:7878/sse after install.
url: "https://github.com/Casperjuel/aula-mcp"
arch:
  - amd64
  - aarch64
init: false
boot: auto
startup: services
host_network: false
ports:
  7878/tcp: 7878
ports_description:
  7878/tcp: aula-mcp HTTP (/mcp) + SSE (/sse)
map:
  # `homeassistant_config:rw` is the modern spelling; the older `config:rw`
  # still works but emits a deprecation warning in recent Supervisor builds.
  - homeassistant_config:rw
# In-addon login UI exposed via HA Ingress. The addon binds two ports:
# - 7878 (above): MCP traffic, exposed to the LAN per `ports:`.
# - 8099 (below): setup/login UI, only reachable through HA's Ingress proxy.
#   `ingress_port` MUST stay in sync with AULA_MCP_INGRESS_PORT in run.sh.
ingress: true
ingress_port: 8099
panel_icon: mdi:school
panel_title: aula-mcp
options:
  aula_mcp_key: ""
  log: false
  allow_remote: true
schema:
  aula_mcp_key: "password?"
  log: bool
  allow_remote: bool
