name: Release Please

# Watches main, accumulates Conventional Commits into a "Release PR" that
# bumps versions + writes CHANGELOG.md. Merging the Release PR tags the
# release and creates a GitHub Release with the changelog as the body —
# which then triggers `release.yml` to compile + attach the binaries.
#
# Bump rules (Conventional Commits):
#   fix:                                    → patch
#   feat:                                   → minor
#   feat!: / fix!: / BREAKING CHANGE footer → major
#   chore:/docs:/refactor:/ci:/test:        → no bump (listed under "Misc")

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v5
        with:
          # Tags pushed by GITHUB_TOKEN don't trigger downstream workflows
          # (anti-recursion). Pass a PAT so the tag push fires release.yml
          # automatically. Falls back to GITHUB_TOKEN if the secret is not
          # set — release-please still works, but you'll need to dispatch
          # release.yml manually after each Release PR merges.
          token: ${{ secrets.RELEASE_PLEASE_TOKEN || secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
