version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      # Workspace internals — pnpm should resolve these locally and they
      # shouldn't appear here, but group defensively in case a published
      # version ever leaks in.
      aula-mcp-workspace:
        patterns:
          - "@aula-mcp/*"
      biome:
        patterns:
          - "@biomejs/*"
      mcp-sdk:
        patterns:
          - "@modelcontextprotocol/*"
      # We don't use vitest (bun:test only — see CONTRIBUTING.md). Group
      # defensively so a stray transitive bump doesn't open multiple PRs.
      vitest:
        patterns:
          - "vitest"
          - "@vitest/*"
          - "vite"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
